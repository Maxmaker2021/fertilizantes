<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Campo Simple Fertilizante — Solicitud de Retiro</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; min-height: 100vh; }

.header { background: #2C703C; padding: 18px 16px 22px; }
.header-brand { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.logo { width: 28px; height: 28px; background: rgba(255,255,255,.2); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.brand { color: #fff; font-size: 13px; font-weight: 600; }
.header-title { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.header-sub { color: rgba(255,255,255,.8); font-size: 13px; line-height: 1.5; }

.container { max-width: 480px; margin: 0 auto; padding: 16px; }

/* Info pre-cargada */
.info-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 14px 16px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item-lbl { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
.info-item-val { font-size: 14px; font-weight: 700; color: #111; }

.warn-bar { background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; padding: 9px 12px; margin-bottom: 14px; font-size: 12px; color: #854d0e; font-weight: 500; }

/* Stepper */
.stepper { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 12px 14px; margin-bottom: 14px; display: flex; align-items: center; }
.step-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.step-circle { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.step-circle.done    { background: #4caf50; color: #fff; }
.step-circle.active  { background: #2C703C; color: #fff; }
.step-circle.pending { background: #e5e7eb; color: #9ca3af; }
.step-lbl { font-size: 9px; font-weight: 600; color: #6b7280; white-space: nowrap; }
.step-lbl.active { color: #2C703C; }
.step-line { flex: 1; height: 2px; margin: 0 4px 12px; }
.step-line.done   { background: #4caf50; }
.step-line.pending{ background: #e5e7eb; }

/* Form card */
.form-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 18px 16px; }
.form-title { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #f3f4f6; }
.field { margin-bottom: 14px; }
.field label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 9px; font-size: 14px; color: #111; outline: none; font-family: inherit; background: #fff; }
.field input:focus, .field select:focus { border-color: #2C703C; box-shadow: 0 0 0 2px rgba(44,112,60,.12); }
.field input[disabled] { background: #f3f4f6; color: #6b7280; }
.field .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }

/* Review */
.review-block { background: #f9fafb; border-radius: 9px; padding: 12px; margin-bottom: 12px; }
.review-block-title { font-size: 10px; font-weight: 700; color: #2C703C; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.review-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #e5e7eb; }
.review-row:last-child { border-bottom: none; }
.review-row span { color: #6b7280; }
.review-row strong { color: #111; }

.btn-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 16px; padding-top: 14px; border-top: 1px solid #f3f4f6; }
.btn { padding: 11px 20px; border-radius: 9px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn-primary { background: #2C703C; color: #fff; flex: 1; }
.btn-primary:hover { background: #245f32; }
.btn-primary:disabled { opacity: .45; cursor: default; }
.btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
.btn-wa { background: #25D366; color: #fff; flex: 1; }

/* Success */
.success-card { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; padding: 36px 20px; text-align: center; margin-top: 16px; }
.success-icon { width: 56px; height: 56px; background: #e8f5e9; border-radius: 50%; border: 2px solid #4caf50; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 14px; }
.success-title { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 6px; }
.success-sub { font-size: 13px; color: #6b7280; line-height: 1.6; margin-bottom: 18px; }
.success-badge { background: #e8f5e9; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #2C703C; font-weight: 500; }

.error-screen { text-align: center; padding: 60px 20px; color: #9ca3af; }
.error-screen .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="logo">🌱</div>
    <div class="brand">Campo Simple Fertilizante</div>
  </div>
  <div class="header-title" id="headerTitle">Cargando…</div>
  <div class="header-sub" id="headerSub"></div>
</div>

<div class="container" id="mainContainer">
  <div style="text-align:center;padding:40px 0;color:#9ca3af;font-size:13px;">Cargando…</div>
</div>

<script>
const SCRIPT_URL = "TU_APPS_SCRIPT_URL_AQUI"; // ← mismo que admin.html
const PARAMS     = new URLSearchParams(window.location.search);
const STOCK_ID   = PARAMS.get("s")||PARAMS.get("stock")||"";
const PRODUCTOR  = decodeURIComponent(PARAMS.get("prod")||PARAMS.get("nombre")||"");

const fmt = d => !d?"—":new Date(d+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
const diasHasta= f => Math.ceil((new Date(f+"T12:00:00")-new Date())/86400000);

let STOCK_ITEM = null;
let STEP = 1;
let DATA = {
  toneladas:"", fechaRetiro:"",
  camion:{ patente:"", acoplado:"", empresa:"", seguro:"", seguroVto:"", habilitacion:"", habVto:"" },
  chofer:{ nombre:"", dni:"", licencia:"", licVto:"", telefono:"" }
};

const STEPS = ["Tu retiro","Camión","Chofer","Confirmar"];

// ─── Init ─────────────────────────────────────────────────────
async function init() {
  // DEMO MODE — sin parámetros de URL
  if (!STOCK_ID) {
    STOCK_ITEM = { id:"DEMO", empresa:"Bunge", contrato:"BU-2025-001", producto:"Urea", toneladas:"500", retirado:"80", puerto:"Rosario", posicion:"P-A1", fechaNegocio:"2025-01-15", fechaRetiro:"2026-08-30" };
    DATA.toneladas = "420";
    document.getElementById("headerTitle").textContent = "¡Hola, Juan Pérez! 👋";
    document.getElementById("headerSub").textContent = "Gracias por tu compra en Campo Simple. Completá el formulario para gestionar tu retiro. Recordá gestionarlo con al menos 48 hs de anticipación.";
    renderStep();
    return;
  }

  try {
    const res = await fetch(`${SCRIPT_URL}?action=getStockItem&id=${STOCK_ID}`);
    const json = await res.json();
    STOCK_ITEM = json.data;
  } catch(e) {
    renderError("Sin conexión","No se pudo cargar la información. Verificá tu conexión e intentá de nuevo.");
    return;
  }

  if (!STOCK_ITEM) { renderError("Formulario no encontrado","Este enlace no es válido o ya expiró. Pedile al cupeador un nuevo link."); return; }

  const sal = Number(STOCK_ITEM.toneladas) - Number(STOCK_ITEM.retirado||0);
  DATA.toneladas = String(sal);

  document.getElementById("headerTitle").textContent = PRODUCTOR ? `¡Hola, ${PRODUCTOR}! 👋` : "Solicitud de retiro";
  document.getElementById("headerSub").textContent = "Gracias por tu compra en Campo Simple. Completá el formulario para gestionar tu retiro. Recordá gestionarlo con al menos 48 hs de anticipación.";

  renderStep();
}

function renderError(title, msg) {
  document.getElementById("headerTitle").textContent = title;
  document.getElementById("headerSub").textContent = "";
  document.getElementById("mainContainer").innerHTML = `
    <div class="error-screen">
      <div class="icon">⚠️</div>
      <div style="font-size:15px;font-weight:600;color:#374151;margin-bottom:8px">${title}</div>
      <div style="font-size:13px;line-height:1.6">${msg}</div>
    </div>`;
}

// ─── Stepper render ───────────────────────────────────────────
function renderStepper() {
  return `<div class="stepper">${STEPS.map((s,i)=>{
    const n=i+1;
    const cls = STEP>n?"done":STEP===n?"active":"pending";
    const lbl = STEP===n?"active":"";
    const lineAf = i<STEPS.length-1;
    return `<div class="step-item">
      <div class="step-circle ${cls}">${STEP>n?"✓":n}</div>
      <div class="step-lbl ${lbl}">${s}</div>
    </div>${lineAf?`<div class="step-line ${STEP>n+1?"done":STEP>n?"done":"pending"}"></div>`:""}`;
  }).join("")}</div>`;
}

// ─── Info pre-cargada ─────────────────────────────────────────
function renderInfoCard() {
  const s = STOCK_ITEM;
  const sal = Number(s.toneladas)-Number(s.retirado||0);
  const d = diasHasta(s.fechaRetiro);
  return `<div class="info-card">
    ${[["Empresa",s.empresa],["Producto",s.producto],["Disponible",`${sal.toLocaleString()} t`],["Puerto",s.puerto]].map(([k,v])=>`<div><div class="info-item-lbl">${k}</div><div class="info-item-val">${v}</div></div>`).join("")}
  </div>
  <div class="warn-bar">⏰ Fecha límite de retiro: <strong>${fmt(s.fechaRetiro)}</strong> — ${d<0?`<span style="color:#b91c1c">Vencido hace ${Math.abs(d)} días</span>`:`${d} días restantes`}</div>`;
}

// ─── Steps ────────────────────────────────────────────────────
function renderStep() {
  const sal = Number(STOCK_ITEM.toneladas)-Number(STOCK_ITEM.retirado||0);
  let formHTML = "";

  if (STEP===1) formHTML=`
    <div class="form-card">
      <div class="form-title">Datos del retiro</div>
      <div class="field"><label>Toneladas a retirar * (máx ${sal.toLocaleString()} t)</label><input type="number" id="fTon" value="${DATA.toneladas}" min="1" max="${sal}" inputmode="numeric"></div>
      <div class="field"><label>Fecha de retiro solicitada *</label><input type="date" id="fFecha" value="${DATA.fechaRetiro}"></div>
      ${renderNavBtn(false,true)}
    </div>`;

  if (STEP===2) formHTML=`
    <div class="form-card">
      <div class="form-title">🚛 Datos del camión</div>
      <div class="field"><label>Patente camión *</label><input type="text" id="cPatente" value="${DATA.camion.patente}" placeholder="ABC 123" autocomplete="off"></div>
      <div class="field"><label>Patente acoplado</label><input type="text" id="cAcoplado" value="${DATA.camion.acoplado}" placeholder="Opcional"></div>
      <div class="field"><label>Empresa transportista *</label><input type="text" id="cEmpresa" value="${DATA.camion.empresa}"></div>
      <div class="field"><label>N° póliza de seguro *</label><input type="text" id="cSeguro" value="${DATA.camion.seguro}"></div>
      <div class="field"><label>Vencimiento del seguro *</label><input type="date" id="cSeguroVto" value="${DATA.camion.seguroVto}"></div>
      <div class="field"><label>N° habilitación RENSPA/SENASA</label><input type="text" id="cHab" value="${DATA.camion.habilitacion}"><div class="hint">Opcional</div></div>
      <div class="field"><label>Vencimiento habilitación</label><input type="date" id="cHabVto" value="${DATA.camion.habVto}"></div>
      ${renderNavBtn(true,true)}
    </div>`;

  if (STEP===3) formHTML=`
    <div class="form-card">
      <div class="form-title">👤 Datos del chofer</div>
      <div class="field"><label>Nombre y apellido *</label><input type="text" id="chNombre" value="${DATA.chofer.nombre}"></div>
      <div class="field"><label>DNI *</label><input type="number" id="chDni" value="${DATA.chofer.dni}" inputmode="numeric"></div>
      <div class="field"><label>N° licencia de conducir *</label><input type="text" id="chLic" value="${DATA.chofer.licencia}"></div>
      <div class="field"><label>Vencimiento de la licencia *</label><input type="date" id="chLicVto" value="${DATA.chofer.licVto}"></div>
      <div class="field"><label>Teléfono de contacto</label><input type="tel" id="chTel" value="${DATA.chofer.telefono}" inputmode="tel"><div class="hint">Opcional</div></div>
      ${renderNavBtn(true,true)}
    </div>`;

  if (STEP===4) {
    const s=STOCK_ITEM;
    formHTML=`
    <div class="form-card">
      <div class="form-title">Revisión final</div>
      <div class="review-block"><div class="review-block-title">Retiro</div>
        ${rv([["Producto",s.producto],["Toneladas",DATA.toneladas+" t"],["Puerto",s.puerto],["Fecha",fmt(DATA.fechaRetiro)]])}
      </div>
      <div class="review-block"><div class="review-block-title">Camión</div>
        ${rv([["Patente",DATA.camion.patente],["Acoplado",DATA.camion.acoplado||"—"],["Empresa",DATA.camion.empresa],["Seguro",DATA.camion.seguro],["Vto. Seguro",fmt(DATA.camion.seguroVto)]])}
      </div>
      <div class="review-block"><div class="review-block-title">Chofer</div>
        ${rv([["Nombre",DATA.chofer.nombre],["DNI",DATA.chofer.dni],["Licencia",DATA.chofer.licencia],["Vto. Licencia",fmt(DATA.chofer.licVto)]])}
      </div>
      <div style="background:#f0fdf4;border:1px solid #c6f6d5;border-radius:8px;padding:9px 12px;font-size:12px;color:#276749;margin-bottom:14px;">
        Al confirmar, tu solicitud se enviará al cupeador de Campo Simple por WhatsApp.
      </div>
      <div class="btn-nav">
        <button class="btn btn-secondary" onclick="anterior()">← Anterior</button>
        <button class="btn btn-wa" onclick="enviar()">💬 Enviar pedido</button>
      </div>
    </div>`;
  }

  document.getElementById("mainContainer").innerHTML =
    renderInfoCard() + renderStepper() + formHTML;
}

function rv(pairs) {
  return pairs.map(([k,v])=>`<div class="review-row"><span>${k}</span><strong>${v}</strong></div>`).join("");
}

function renderNavBtn(back, next) {
  return `<div class="btn-nav">
    ${back?`<button class="btn btn-secondary" onclick="anterior()">← Anterior</button>`:`<span></span>`}
    ${next?`<button class="btn btn-primary" onclick="siguiente()">Siguiente →</button>`:""}
  </div>`;
}

// ─── Nav ──────────────────────────────────────────────────────
function guardarStep() {
  if (STEP===1) {
    DATA.toneladas = document.getElementById("fTon")?.value||"";
    DATA.fechaRetiro = document.getElementById("fFecha")?.value||"";
  }
  if (STEP===2) {
    DATA.camion = {
      patente:   document.getElementById("cPatente")?.value?.trim()||"",
      acoplado:  document.getElementById("cAcoplado")?.value?.trim()||"",
      empresa:   document.getElementById("cEmpresa")?.value?.trim()||"",
      seguro:    document.getElementById("cSeguro")?.value?.trim()||"",
      seguroVto: document.getElementById("cSeguroVto")?.value||"",
      habilitacion: document.getElementById("cHab")?.value?.trim()||"",
      habVto:    document.getElementById("cHabVto")?.value||"",
    };
  }
  if (STEP===3) {
    DATA.chofer = {
      nombre:   document.getElementById("chNombre")?.value?.trim()||"",
      dni:      document.getElementById("chDni")?.value?.trim()||"",
      licencia: document.getElementById("chLic")?.value?.trim()||"",
      licVto:   document.getElementById("chLicVto")?.value||"",
      telefono: document.getElementById("chTel")?.value?.trim()||"",
    };
  }
}

function validarStep() {
  if (STEP===1) {
    const ton=+document.getElementById("fTon")?.value;
    const sal=Number(STOCK_ITEM.toneladas)-Number(STOCK_ITEM.retirado||0);
    if (!ton||ton<1){alert("Ingresá las toneladas a retirar");return false;}
    if (ton>sal){alert(`Máximo disponible: ${sal} t`);return false;}
    if (!document.getElementById("fFecha")?.value){alert("Ingresá la fecha de retiro");return false;}
  }
  if (STEP===2) {
    if (!document.getElementById("cPatente")?.value?.trim()){alert("Ingresá la patente del camión");return false;}
    if (!document.getElementById("cEmpresa")?.value?.trim()){alert("Ingresá la empresa transportista");return false;}
    if (!document.getElementById("cSeguro")?.value?.trim()){alert("Ingresá el número de seguro");return false;}
    if (!document.getElementById("cSeguroVto")?.value){alert("Ingresá el vencimiento del seguro");return false;}
  }
  if (STEP===3) {
    if (!document.getElementById("chNombre")?.value?.trim()){alert("Ingresá el nombre del chofer");return false;}
    if (!document.getElementById("chDni")?.value?.trim()){alert("Ingresá el DNI");return false;}
    if (!document.getElementById("chLic")?.value?.trim()){alert("Ingresá el número de licencia");return false;}
    if (!document.getElementById("chLicVto")?.value){alert("Ingresá el vencimiento de la licencia");return false;}
  }
  return true;
}

function siguiente() {
  if (!validarStep()) return;
  guardarStep();
  STEP++;
  renderStep();
  window.scrollTo(0,0);
}
function anterior() {
  guardarStep();
  STEP--;
  renderStep();
  window.scrollTo(0,0);
}

// ─── Enviar ───────────────────────────────────────────────────
async function enviar() {
  const btn = document.querySelector(".btn-wa");
  btn.disabled=true; btn.textContent="Enviando…";

  const pedido = {
    id: "PED-"+Date.now(),
    stockId: STOCK_ID,
    productor: PRODUCTOR,
    toneladas: +DATA.toneladas,
    fechaRetiro: DATA.fechaRetiro,
    patente:      DATA.camion.patente,
    acoplado:     DATA.camion.acoplado,
    transportista:DATA.camion.empresa,
    seguro:       DATA.camion.seguro,
    vtoSeguro:    DATA.camion.seguroVto,
    habilitacion: DATA.camion.habilitacion,
    vtoHab:       DATA.camion.habVto,
    chofer:       DATA.chofer.nombre,
    dni:          DATA.chofer.dni,
    licencia:     DATA.chofer.licencia,
    vtoLic:       DATA.chofer.licVto,
    telefono:     DATA.chofer.telefono,
    fechaCreacion: new Date().toISOString().slice(0,10),
  };

  // Guardar en Sheets
  try {
    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"addPedido",data:pedido})});
  } catch {}

  // WA al cupeador
  const s = STOCK_ITEM;
  const msg = encodeURIComponent(
`📋 *Nuevo pedido de cupo · Campo Simple Fertilizante*

*Productor:* ${PRODUCTOR}
*Empresa:* ${s.empresa}
*Producto:* ${s.producto} · ${DATA.toneladas} t
*Puerto:* ${s.puerto}
*Retiro:* ${fmt(DATA.fechaRetiro)}
*Camión:* ${DATA.camion.patente} · ${DATA.camion.empresa}
*Chofer:* ${DATA.chofer.nombre} · DNI ${DATA.chofer.dni}

_ID Pedido: ${pedido.id}_`);
  window.open("https://wa.me/?text="+msg,"_blank");

  // Mostrar éxito
  document.getElementById("mainContainer").innerHTML=`
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="success-title">¡Pedido enviado!</div>
      <div class="success-sub">Tu solicitud fue enviada al cupeador de Campo Simple. Te contactarán para confirmar el retiro.</div>
      <div class="success-badge">
        ${s.producto} · ${DATA.toneladas} t · ${s.puerto}<br>
        Retiro solicitado: ${fmt(DATA.fechaRetiro)}
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
